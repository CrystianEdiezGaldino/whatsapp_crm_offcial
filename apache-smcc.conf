<VirtualHost *:80>
    ServerName 192.168.255.5
    DocumentRoot /var/www/smcc-whatsapp/public

    <Directory /var/www/smcc-whatsapp>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/smcc-whatsapp/public>
        AllowOverride All
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [QSA,L]
        </IfModule>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/smcc-whatsapp-error.log
    CustomLog ${APACHE_LOG_DIR}/smcc-whatsapp-access.log combined
</VirtualHost>
