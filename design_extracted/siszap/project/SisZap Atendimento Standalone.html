document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'crystiangaldinno', phone: '+55 41 98874-6624', status: 'fila', owner: null, sector: 'Secretaria', tags: [], wait: 12, unread: 1, rating: null, replied: false,\n        reply: 'Show, vou levar os documentos então.',\n        messages: [\n          { from: 'sys', text: 'Fluxo Boas-vindas concluído · Encaminhado para Secretaria' },\n          { from: 'in', text: 'Preciso fazer a segunda via da carteirinha do clube, como funciona?', time: '10:13' }\n        ] },\n      { id: 5, name: 'Roberto Lima', phone: '+55 41 99655-2210', status: 'fila', owner: null, sector: 'Eventos', tags: ['Salão de festas'], wait: 23, unread: 3, rating: null, replied: false,\n        reply: 'Combinado, aguardo o retorno!',\n        messages: [\n          { from: 'sys', text: 'Fluxo Boas-vindas concluído · Encaminhado para Eventos' },\n          { from: 'in', text: 'Boa tarde! Quero saber os valores do salão de festas para dezembro.', time: '10:02' },\n          { from: 'in', text: 'Seria para uns 80 convidados.', time: '10:03' },\n          { from: 'in', text: 'Alô? Alguém aí?', time: '10:18' }\n        ] },\n      { id: 6, name: 'Fernanda Castro', phone: '+55 41 99123-8876', status: 'encerrado', owner: 'Crystian', sector: 'Secretaria', tags: ['Day use'], wait: 0, unread: 0, rating: 5, replied: true,\n        reply: '',\n        messages: [\n          { from: 'in', text: 'Oi! Posso levar uma convidada no domingo? Como funciona o day use?', time: '09:12' },\n          { from: 'out', text: 'Olá, Fernanda! Pode sim. O convite day use custa R$ 35 e pode ser pago na portaria ou pelo app.', time: '09:15' },\n          { from: 'in', text: 'Perfeito, obrigada!', time: '09:17' },\n          { from: 'sys', text: 'Atendimento encerrado por Crystian · 09:20' },\n          { from: 'sys', text: 'O cliente avaliou o atendimento: ★★★★★ (5/5)' }\n        ] }\n    ]\n  };\n\n  msgsEl = React.createRef();\n  PAL = [['#E0E7FF','#4338CA'],['#DCFCE7','#15803D'],['#FEF3C7','#B45309'],['#FCE7F3','#BE185D'],['#DBEAFE','#1D4ED8'],['#F3E8FF','#7E22CE'],['#FFE4E6','#BE123C'],['#CCFBF1','#0F766E']];\n  SECTOR_DOTS = ['#4353E8','#1DA85A','#F59E0B','#BE185D'];\n  ME = 'Crystian';\n\n  componentDidMount() { this.scrollMsgs(); }\n  componentDidUpdate() { this.scrollMsgs(); }\n\n  scrollMsgs() {\n    const el = this.msgsEl.current;\n    if (!el) return;\n    const a = this.state.chats.find(c => c.id === this.state.activeChatId);\n    const key = this.state.activeChatId + ':' + (a ? a.messages.length : 0) + ':' + (this.state.typing || 0);\n    if (key !== this._scrollKey) { this._scrollKey = key; el.scrollTop = el.scrollHeight; }\n  }\n\n  showToast(t) {\n    clearTimeout(this._tt);\n    this.setState({ toast: t });\n    this._tt = setTimeout(() => this.setState({ toast: null }), 2600);\n  }\n\n  nowTime() {\n    const d = new Date();\n    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');\n  }\n\n  upChat(id, fn) {\n    this.setState(s => ({ chats: s.chats.map(c => c.id === id ? fn({ ...c, messages: [...c.messages], tags: [...c.tags] }) : c) }));\n  }\n\n  pushMsg(id, msg) { this.upChat(id, c => { c.messages.push(msg); return c; }); }\n\n  acceptChat(id) {\n    this.upChat(id, c => { c.status = 'meu'; c.owner = this.ME; c.unread = 0; c.messages.push({ from: 'sys', text: 'Você aceitou este atendimento · ' + this.nowTime() }); return c; });\n    this.setState({ activeChatId: id, queueTab: 'meus', screen: 'atendimento' });\n    this.showToast('Atendimento aceito');\n  }\n\n  sendMsg() {\n    const t = this.state.composer.trim();\n    if (!t) return;\n    const id = this.state.activeChatId;\n    const chat = this.state.chats.find(c => c.id === id);\n    if (!chat || chat.status !== 'meu' || chat.owner !== this.ME) return;\n    const note = this.state.noteMode;\n    this.pushMsg(id, { from: note ? 'note' : 'out', text: t, time: this.nowTime() });\n    this.setState({ composer: '', macroOpen: false, attachOpen: false });\n    if (!note && !chat.replied && chat.reply) {\n      this.upChat(id, c => { c.replied = true; return c; });\n      setTimeout(() => this.setState({ typing: id }), 1100);\n      setTimeout(() => {\n        this.setState(s => ({ typing: s.typing === id ? null : s.typing }));\n        this.pushMsg(id, { from: 'in', text: chat.reply, time: this.nowTime() });\n      }, 3000);\n    }\n  }\n\n  sendAttach(kind) {\n    const id = this.state.activeChatId;\n    const msg = kind === 'img'\n      ? { from: 'out', kind: 'img', text: '', time: this.nowTime() }\n      : kind === 'audio'\n        ? { from: 'out', kind: 'audio', text: '', time: this.nowTime() }\n        : { from: 'out', text: 'documento: regulamento_reservas.pdf', time: this.nowTime() };\n    this.pushMsg(id, msg);\n    this.setState({ attachOpen: false });\n  }\n\n  doTransferAction() {\n    const sel = this.state.transferSel;\n    if (!sel) return;\n    const id = this.state.activeChatId;\n    if (sel.kind === 'setor') {\n      this.upChat(id, c => { c.status = 'fila'; c.owner = null; c.sector = sel.name; c.wait = 0; c.messages.push({ from: 'sys', text: 'Transferido para o setor ' + sel.name + ' por ' + this.ME }); return c; });\n      this.setState({ transferOpen: false, transferSel: null, queueTab: 'fila' });\n      this.showToast('Transferido para o setor ' + sel.name);\n    } else {\n      this.upChat(id, c => { c.owner = sel.name; c.messages.push({ from: 'sys', text: 'Transferido para ' + sel.name + ' por ' + this.ME }); return c; });\n      this.setState({ transferOpen: false, transferSel: null, activeChatId: null });\n      this.showToast('Transferido para ' + sel.name);\n    }\n  }\n\n  doCloseAction() {\n    const id = this.state.activeChatId;\n    const survey = this.state.closeSurvey;\n    this.upChat(id, c => {\n      c.status = 'encerrado';\n      c.messages.push({ from: 'sys', text: 'Atendimento encerrado por ' + this.ME + ' · ' + this.nowTime() });\n      if (survey) c.messages.push({ from: 'sys', text: 'Pesquisa de satisfação enviada ao cliente' });\n      return c;\n    });\n    this.setState({ closeOpen: false, queueTab: 'encerrados' });\n    this.showToast('Atendimento encerrado');\n    if (survey) {\n      setTimeout(() => {\n        this.upChat(id, c => { if (c.rating == null) { c.rating = 5; c.messages.push({ from: 'sys', text: 'O cliente avaliou o atendimento: ★★★★★ (5/5)' }); } return c; });\n      }, 3200);\n    }\n  }\n\n  startChatFromContact(ct) {\n    const found = this.state.chats.find(c => c.name === ct.name);\n    if (found) {\n      this.setState({ screen: 'atendimento', activeChatId: found.id, queueTab: found.status === 'fila' ? 'fila' : found.status === 'encerrado' ? 'encerrados' : 'meus' });\n      return;\n    }\n    const nid = Math.max(...this.state.chats.map(c => c.id)) + 1;\n    const nc = { id: nid, name: ct.name, phone: ct.phone, status: 'meu', owner: this.ME, sector: 'Secretaria', tags: [], wait: 0, unread: 0, rating: null, replied: true, reply: '',\n      messages: [{ from: 'sys', text: 'Atendimento iniciado por ' + this.ME + ' · ' + this.nowTime() }] };\n    this.setState(s => ({ chats: [...s.chats, nc], screen: 'atendimento', activeChatId: nid, queueTab: 'meus' }));\n    this.showToast('Atendimento iniciado com ' + ct.name);\n  }\n\n  avatarFor(id) { return this.PAL[id % this.PAL.length]; }\n\n  slaInfo(chat) {\n    const sec = this.state.sectors.find(s => s.name === chat.sector);\n    const target = sec ? sec.sla : 15;\n    if (chat.wait > target) return { bg: '#FEE2E2', fg: '#B91C1C' };\n    if (chat.wait > target * 0.6) return { bg: '#FEF3C7', fg: '#B45309' };\n    return { bg: '#E8F8EF', fg: '#15803D' };\n  }\n\n  previewOf(chat) {\n    const ms = chat.messages.filter(m => m.from !== 'sys');\n    const last = ms[ms.length - 1];\n    if (!last) return '—';\n    if (last.kind === 'img') return 'Imagem';\n    if (last.kind === 'audio') return 'Mensagem de áudio';\n    return (last.from === 'note' ? 'Nota: ' : '') + last.text;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const me = this.ME;\n\n    // ---- nav\n    const screens = ['atendimento', 'contatos', 'macros', 'fila', 'equipe', 'fluxos'];\n    const nav = {}, go = {};\n    screens.forEach(sc => {\n      const on = s.screen === sc;\n      nav[sc] = { bg: on ? '#EEF0FE' : 'transparent', color: on ? '#4353E8' : '#5A6172' };\n      go[sc] = () => this.setState({ screen: sc });\n    });\n\n    // ---- chats decorated\n    const deco = (c) => {\n      const [avBg, avFg] = this.avatarFor(c.id);\n      const sla = this.slaInfo(c);\n      const ms = c.messages.filter(m => m.from !== 'sys');\n      const last = ms[ms.length - 1];\n      return {\n        ...c,\n        initial: c.name.charAt(0).toUpperCase(),\n        avBg, avFg,\n        rowBg: c.id === s.activeChatId ? '#EEF0FE' : 'transparent',\n        preview: this.previewOf(c),\n        time: last && last.time ? last.time : '',\n        isFila: c.status === 'fila',\n        rated: c.rating != null,\n        ratingLabel: c.rating != null ? c.rating + ',0' : '',\n        waitLabel: 'há ' + c.wait + ' min',\n        slaBg: sla.bg, slaFg: sla.fg,\n        open: () => this.setState({ activeChatId: c.id }),\n        accept: (e) => { e.stopPropagation(); this.acceptChat(c.id); },\n        assignCheila: () => {\n          this.upChat(c.id, x => { x.status = 'meu'; x.owner = 'Cheila'; x.messages.push({ from: 'sys', text: 'Atribuído a Cheila por ' + me }); return x; });\n          this.showToast('Atribuído a Cheila');\n        }\n      };\n    };\n\n    const meus = s.chats.filter(c => c.status === 'meu' && c.owner === me);\n    const fila = s.chats.filter(c => c.status === 'fila');\n    const enc = s.chats.filter(c => c.status === 'encerrado');\n    const q = s.search.toLowerCase();\n    const pool = s.queueTab === 'meus' ? meus : s.queueTab === 'fila' ? fila : enc;\n    const chatList = pool.filter(c => !q || c.name.toLowerCase().includes(q) || c.phone.includes(q)).map(deco);\n\n    const tabS = {};\n    ['meus', 'fila', 'encerrados'].forEach(t => {\n      const on = s.queueTab === t;\n      tabS[t] = { bg: on ? '#14171F' : '#F0F2F7', color: on ? '#FFFFFF' : '#5A6172' };\n    });\n\n    // ---- active chat\n    const ac = s.chats.find(c => c.id === s.activeChatId) || null;\n    let active = { name: '', tagChips: [], isMine: false, isFila: false, isClosed: false, hasSla: false };\n    let messages = [];\n    if (ac) {\n      const d = deco(ac);\n      const sec = s.sectors.find(x => x.name === ac.sector);\n      const isMine = ac.status === 'meu' && ac.owner === me;\n      active = {\n        ...d,\n        isMine,\n        isClosed: ac.status === 'encerrado',\n        isFila: ac.status === 'fila',\n        hasSla: ac.status === 'fila',\n        slaLabel: 'Aguardando ' + ac.wait + ' min · SLA ' + (sec ? sec.sla : 15) + ' min',\n        statusLine: ac.status === 'fila'\n          ? ac.phone + ' · Na fila · ' + ac.sector\n          : ac.status === 'encerrado'\n            ? ac.phone + ' · Encerrado'\n            : ac.phone + ' · Em atendimento com ' + (ac.owner === me ? 'você' : ac.owner),\n        tagChips: ac.tags.map(t => ({\n          name: t,\n          remove: () => this.upChat(ac.id, c => { c.tags = c.tags.filter(x => x !== t); return c; })\n        }))\n      };\n      messages = ac.messages.map(m => ({\n        ...m,\n        isSys: m.from === 'sys',\n        isIn: m.from === 'in',\n        isOut: m.from === 'out',\n        isNote: m.from === 'note',\n        isImg: m.kind === 'img',\n        isAudio: m.kind === 'audio',\n        hasText: m.from === 'out' && !m.kind && !!m.text || m.from === 'out' && m.kind === undefined\n      }));\n    }\n\n    // ---- contato do painel\n    const findContact = (name) => s.contacts.find(c => c.name === name);\n    const pc = ac ? (findContact(ac.name) || { name: ac.name, phone: ac.phone, mat: '—', cat: 'Visitante', since: '—', msgs: ac.messages.length, convs: 1, hist: [] }) : null;\n    const panelContact = pc ? { ...pc, initial: pc.name.charAt(0).toUpperCase(), avBg: this.avatarFor(ac.id)[0], avFg: this.avatarFor(ac.id)[1] } : {};\n\n    // ---- macros popover\n    const mq = s.composer.startsWith('/') ? s.composer.slice(1).toLowerCase() : '';\n    const macroPop = s.macros\n      .filter(m => !mq || m.shortcut.slice(1).startsWith(mq) || m.title.toLowerCase().includes(mq))\n      .map(m => ({ ...m, insert: () => { this.setState({ composer: m.content, macroOpen: false }); } }));\n\n    // ---- transfer modal\n    const transferSectors = s.sectors.map((sec, i) => {\n      const on = s.transferSel && s.transferSel.kind === 'setor' && s.transferSel.name === sec.name;\n      return { ...sec, dot: this.SECTOR_DOTS[i % 4], border: on ? '#4353E8' : '#E8EAF0', bg: on ? '#EEF0FE' : '#FFFFFF',\n        pick: () => this.setState({ transferSel: { kind: 'setor', name: sec.name } }) };\n    });\n    const transferAgents = s.agents.filter(a => a.name !== me && a.active).map(a => {\n      const on = s.transferSel && s.transferSel.kind === 'agente' && s.transferSel.name === a.name;\n      const [avBg, avFg] = this.avatarFor(a.id + 3);\n      return { ...a, initial: a.name.charAt(0), avBg, avFg,\n        statusColor: a.status === 'online' ? '#22C55E' : a.status === 'ausente' ? '#F59E0B' : '#9CA3AF',\n        statusLabel: a.status === 'online' ? 'Online' : a.status === 'ausente' ? 'Ausente' : 'Offline',\n        border: on ? '#4353E8' : '#E8EAF0', bg: on ? '#EEF0FE' : '#FFFFFF',\n        pick: () => this.setState({ transferSel: { kind: 'agente', name: a.name } }) };\n    });\n\n    // ---- contatos screen\n    const cq = s.contactSearch.toLowerCase();\n    const contactsList = s.contacts.filter(c => !cq || c.name.toLowerCase().includes(cq) || c.phone.includes(cq)).map(c => {\n      const [avBg, avFg] = this.avatarFor(c.id);\n      return { ...c, initial: c.name.charAt(0).toUpperCase(), avBg, avFg,\n        rowBg: c.id === s.contactSel ? '#EEF0FE' : 'transparent',\n        pick: () => this.setState({ contactSel: c.id }) };\n    });\n    const scRaw = s.contacts.find(c => c.id === s.contactSel) || s.contacts[0];\n    const selContact = { ...scRaw, initial: scRaw.name.charAt(0).toUpperCase(),\n      avBg: this.avatarFor(scRaw.id)[0], avFg: this.avatarFor(scRaw.id)[1],\n      startChat: () => this.startChatFromContact(scRaw) };\n\n    // ---- macros screen\n    const draft = s.macroDraft || s.macros.find(m => m.id === s.macroSel) || s.macros[0];\n    const macrosList = s.macros.map(m => {\n      const on = m.id === s.macroSel;\n      return { ...m, border: on ? '#4353E8' : '#ECEEF4', bg: on ? '#EEF0FE' : '#FFFFFF',\n        pick: () => this.setState({ macroSel: m.id, macroDraft: { ...m } }) };\n    });\n    const setDraft = (field) => (e) => this.setState({ macroDraft: { ...draft, [field]: e.target.value } });\n\n    // ---- fila screen\n    const filaList = fila.map(deco);\n    const maxWait = fila.length ? Math.max(...fila.map(c => c.wait)) : 0;\n    const slaBreached = fila.filter(c => { const sec = s.sectors.find(x => x.name === c.sector); return c.wait > (sec ? sec.sla : 15); }).length;\n    const distModesRaw = [\n      { id: 'manual', name: 'Manual', desc: 'Atendentes puxam os chats da fila manualmente.' },\n      { id: 'rodizio', name: 'Rodízio (round-robin)', desc: 'Distribui em sequência entre os atendentes online.' },\n      { id: 'menos', name: 'Menos ocupado', desc: 'Envia para quem tem menos chats ativos no momento.' }\n    ];\n    const distModes = distModesRaw.map(d => {\n      const on = s.distMode === d.id;\n      return { ...d, border: on ? '#4353E8' : '#ECEEF4', bg: on ? '#EEF0FE' : '#FFFFFF',\n        dotBorder: on ? '#4353E8' : '#C9CEDC', dotBg: on ? '#4353E8' : 'transparent',\n        pick: () => { this.setState({ distMode: d.id }); this.showToast('Modo de distribuição: ' + d.name); } };\n    });\n    const sectorsList = s.sectors.map((sec, i) => ({ ...sec, dot: this.SECTOR_DOTS[i % 4],\n      agentCount: s.agents.filter(a => a.sector === sec.name && a.active).length }));\n\n    // ---- equipe screen\n    const agentsList = s.agents.map(a => {\n      const [avBg, avFg] = this.avatarFor(a.id + 3);\n      return { ...a, initial: a.name.charAt(0), avBg, avFg,\n        statusColor: a.status === 'online' ? '#22C55E' : a.status === 'ausente' ? '#F59E0B' : '#9CA3AF',\n        statusLabel: a.status === 'online' ? 'Online' : a.status === 'ausente' ? 'Ausente' : 'Offline',\n        swBg: a.active ? '#1DA85A' : '#D7DBE6', swX: a.active ? '18px' : '2px',\n        toggle: () => this.setState(st => ({ agents: st.agents.map(x => x.id === a.id ? { ...x, active: !x.active } : x) })) };\n    });\n\n    // ---- fluxos screen\n    const flowsList = s.flows.map(f => {\n      const on = f.id === s.flowSel;\n      return { ...f, stepCount: f.steps.length,\n        border: on ? '#4353E8' : '#ECEEF4', bg: on ? '#EEF0FE' : '#FFFFFF',\n        swBg: f.active ? '#1DA85A' : '#D7DBE6', swX: f.active ? '18px' : '2px',\n        pick: () => this.setState({ flowSel: f.id }),\n        toggle: (e) => { e.stopPropagation(); this.setState(st => ({ flows: st.flows.map(x => x.id === f.id ? { ...x, active: !x.active } : x) })); } };\n    });\n    const sfRaw = s.flows.find(f => f.id === s.flowSel) || s.flows[0];\n    const selFlow = { ...sfRaw,\n      statusLabel: sfRaw.active ? 'Ativo' : 'Pausado',\n      statusColor: sfRaw.active ? '#1DA85A' : '#9CA3AF',\n      steps: sfRaw.steps.map((st, i) => ({ ...st, n: i + 1 })) };\n\n    const transferReady = !!s.transferSel;\n\n    return {\n      // nav\n      nav, go,\n      isAtendimento: s.screen === 'atendimento',\n      isContatos: s.screen === 'contatos',\n      isMacros: s.screen === 'macros',\n      isFila: s.screen === 'fila',\n      isEquipe: s.screen === 'equipe',\n      isFluxos: s.screen === 'fluxos',\n\n      // lista de chats\n      search: s.search,\n      onSearch: (e) => this.setState({ search: e.target.value }),\n      tab: {\n        meus: () => this.setState({ queueTab: 'meus' }),\n        fila: () => this.setState({ queueTab: 'fila' }),\n        encerrados: () => this.setState({ queueTab: 'encerrados' })\n      },\n      tabS,\n      meusCount: meus.length,\n      filaCount: fila.length,\n      hasFila: fila.length > 0,\n      chatList,\n      listEmpty: chatList.length === 0,\n\n      // conversa\n      hasActive: !!ac,\n      noActive: !ac,\n      active,\n      messages,\n      msgsRef: this.msgsEl,\n      showTyping: !!ac && s.typing === ac.id,\n      acceptActive: () => this.acceptChat(s.activeChatId),\n      reopen: () => { this.upChat(s.activeChatId, c => { c.status = 'meu'; c.owner = me; c.messages.push({ from: 'sys', text: 'Atendimento reaberto por ' + me }); return c; }); this.setState({ queueTab: 'meus' }); },\n\n      // composer\n      composer: s.composer,\n      composerPh: s.noteMode ? 'Escreva uma nota interna...' : 'Digite uma mensagem...',\n      composerBg: s.noteMode ? '#FFF7DE' : '#F7F8FB',\n      composerBorder: s.noteMode ? '#E5CE8F' : '#E2E5EE',\n      sendBg: s.composer.trim() ? (s.noteMode ? '#D9A514' : '#1DA85A') : '#C9CEDC',\n      onComposer: (e) => {\n        const v = e.target.value;\n        this.setState({ composer: v, macroOpen: v.startsWith('/') });\n      },\n      onComposerKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMsg(); } },\n      send: () => this.sendMsg(),\n      noteMode: s.noteMode,\n      noteBtnBg: s.noteMode ? '#FFF7DE' : '#FFFFFF',\n      noteBtnBorder: s.noteMode ? '#E5CE8F' : '#E2E5EE',\n      noteBtnFg: s.noteMode ? '#B45309' : '#5A6172',\n      toggleNote: () => this.setState({ noteMode: !s.noteMode, macroOpen: false, attachOpen: false }),\n      macroOpen: s.macroOpen,\n      toggleMacro: () => this.setState({ macroOpen: !s.macroOpen, attachOpen: false }),\n      macroPop,\n      attachOpen: s.attachOpen,\n      toggleAttach: () => this.setState({ attachOpen: !s.attachOpen, macroOpen: false }),\n      sendImage: () => this.sendAttach('img'),\n      sendAudio: () => this.sendAttach('audio'),\n      sendDoc: () => this.sendAttach('doc'),\n\n      // painel do contato\n      contactPanelOn: s.showContact && !!ac && s.screen === 'atendimento',\n      toggleContact: () => this.setState({ showContact: !s.showContact }),\n      infoBtnBg: s.showContact ? '#EEF0FE' : '#FFFFFF',\n      infoBtnFg: s.showContact ? '#4353E8' : '#5A6172',\n      panelContact,\n      addTag: () => { this.upChat(s.activeChatId, c => { if (!c.tags.includes('VIP')) c.tags.push('VIP'); return c; }); this.showToast('Etiqueta adicionada'); },\n\n      // transferir\n      transferOpen: s.transferOpen,\n      openTransfer: () => this.setState({ transferOpen: true, transferSel: null }),\n      closeTransfer: () => this.setState({ transferOpen: false, transferSel: null }),\n      transferSectors, transferAgents,\n      transferBtnBg: transferReady ? '#4353E8' : '#C9CEDC',\n      transferBtnCursor: transferReady ? 'pointer' : 'default',\n      doTransfer: () => this.doTransferAction(),\n      stopProp: (e) => e.stopPropagation(),\n\n      // encerrar\n      closeOpen: s.closeOpen,\n      openClose: () => this.setState({ closeOpen: true }),\n      closeCloseModal: () => this.setState({ closeOpen: false }),\n      toggleSurvey: () => this.setState({ closeSurvey: !s.closeSurvey }),\n      surveyBg: s.closeSurvey ? '#1DA85A' : '#D7DBE6',\n      surveyX: s.closeSurvey ? '18px' : '2px',\n      doClose: () => this.doCloseAction(),\n\n      // contatos\n      contactSearch: s.contactSearch,\n      onContactSearch: (e) => this.setState({ contactSearch: e.target.value }),\n      contactsTotal: s.contacts.length,\n      contactsList, selContact,\n\n      // macros\n      macrosList,\n      macroDraft: draft,\n      macroChars: (draft.content || '').length,\n      onMacroTitle: setDraft('title'),\n      onMacroShortcut: setDraft('shortcut'),\n      onMacroContent: setDraft('content'),\n      addMacro: () => {\n        const nid = Math.max(...s.macros.map(m => m.id)) + 1;\n        const nm = { id: nid, shortcut: '/nova', title: 'Nova macro', content: '', uses: 0 };\n        this.setState(st => ({ macros: [...st.macros, nm], macroSel: nid, macroDraft: { ...nm } }));\n      },\n      saveMacro: () => {\n        this.setState(st => ({ macros: st.macros.map(m => m.id === st.macroSel ? { ...m, ...st.macroDraft } : m) }));\n        this.showToast('Macro salva');\n      },\n      delMacro: () => {\n        this.setState(st => {\n          const rest = st.macros.filter(m => m.id !== st.macroSel);\n          const first = rest[0] || null;\n          return { macros: rest, macroSel: first ? first.id : null, macroDraft: first ? { ...first } : null };\n        });\n        this.showToast('Macro excluída');\n      },\n\n      // fila & distribuição\n      filaList,\n      filaEmpty: fila.length === 0,\n      maxWait, slaBreached,\n      distModes, sectorsList,\n\n      // equipe\n      agentsList,\n\n      // fluxos\n      flowsList, selFlow,\n\n      // toast / util\n      toast: s.toast,\n      hasToast: !!s.toast,\n      simulated: () => this.showToast('Ação simulada neste protótipo')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
