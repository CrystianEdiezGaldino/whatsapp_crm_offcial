  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-size:11.5px;font-weight:700;color:#B45309;background:#FFF7DE;border:1px dashed #E5CE8F;border-radius:9px;padding:6px 11px;margin-bottom:9px;\">\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M8 10V7a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg>\n              Modo nota interna — visível apenas para a equipe\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <button style=\"width:40px;height:42px;border-radius:11px;border:1px solid #E5CE8F;background:#FFF7DE;color:#B45309;display:flex;align-items:center;justify-content:center;cursor:pointer;\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 20l1.2-4.2L17 4l3 3L8.2 18.8 4 20z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <button style=\"width:40px;height:42px;border-radius:13px;border:none;background:#E8EBF1;color:#5A6172;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:4px 4px 10px #c4c8d4,-4px -4px 10px #ffffff;\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 4 14h6l-1 8 9-12h-6l1-8z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <button style=\"width:40px;height:42px;border-radius:13px;border:none;background:#E8EBF1;color:#5A6172;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:4px 4px 10px #c4c8d4,-4px -4px 10px #ffffff;\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <input type=\"text\" placeholder=\"Escreva uma nota interna...\" style=\"flex:1;height:42px;border:1px solid #E5CE8F;border-radius:12px;padding:0 14px;font-size:14px;background:#FFF7DE;color:#14171F;font-family:'Figtree',sans-serif;\">\n              <button style=\"width:46px;height:42px;border:none;border-radius:12px;background:#D9A514;color:#FFFFFF;display:flex;align-items:center;justify-content:center;cursor:pointer;\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11 21 3l-8 18-2.5-7.5L3 11z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#E8EBF1;border:none;border-radius:20px;box-shadow:6px 6px 16px #c4c8d4,-6px -6px 16px #ffffff;padding:18px;\">\n            <div style=\"font-size:10.5px;font-weight:700;color:#4353E8;margin-bottom:10px;letter-spacing:0.08em;\">POPOVER DE MACROS (digita /)<\u002Fdiv>\n            <div style=\"border:none;border-radius:16px;padding:6px;background:#E8EBF1;box-shadow:6px 6px 16px #c4c8d4,-6px -6px 16px #ffffff;\">\n              <div style=\"font-size:10.5px;font-weight:800;letter-spacing:0.08em;color:#9CA3AF;padding:8px 12px 4px;\">MACROS · RESPOSTAS RÁPIDAS<\u002Fdiv>\n              <div style=\"padding:9px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;background:#EEF0FE;\">\n                <span style=\"font-family:monospace;font-size:11.5px;font-weight:700;color:#4353E8;background:#EEF0FE;border-radius:7px;padding:3px 8px;flex-shrink:0;border:1px solid #C7CCFB;\">/ola<\u002Fspan>\n                <div style=\"min-width:0;\">\n                  <div style=\"font-size:13px;font-weight:700;\">Saudação<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Olá! Bem-vindo ao atendimento do Santa Mônica...<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:9px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;\">\n                <span style=\"font-family:monospace;font-size:11.5px;font-weight:700;color:#4353E8;background:#EEF0FE;border-radius:7px;padding:3px 8px;flex-shrink:0;\">/boleto<\u002Fspan>\n                <div style=\"min-width:0;\">\n                  <div style=\"font-size:13px;font-weight:700;\">Segunda via de boleto<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Claro! Me informe o número do seu título...<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:9px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;\">\n                <span style=\"font-family:monospace;font-size:11.5px;font-weight:700;color:#4353E8;background:#EEF0FE;border-radius:7px;padding:3px 8px;flex-shrink:0;\">/tchau<\u002Fspan>\n                <div style=\"min-width:0;\">\n                  <div style=\"font-size:13px;font-weight:700;\">Encerramento<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Fico à disposição! Qualquer coisa é só chamar...<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ═══════════ SPACING ═══════════ -->\n      <section id=\"spacing\" style=\"margin-bottom:80px;\">\n        <div style=\"font-size:11px;font-weight:800;letter-spacing:0.1em;color:#9CA3AF;margin-bottom:6px;\">FUNDAÇÃO<\u002Fdiv>\n        <div style=\"font-size:26px;font-weight:800;margin-bottom:4px;\">Espaçamento &amp; Raios<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6B7280;margin-bottom:24px;\">Escala de padding, gap e border-radius usados no sistema<\u002Fdiv>\n        <div style=\"background:#E8EBF1;border:none;border-radius:20px;box-shadow:6px 6px 16px #c4c8d4,-6px -6px 16px #ffffff;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n          <div>\n            <div style=\"font-size:11px;font-weight:800;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:14px;\">ESCALA DE ESPAÇAMENTO<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;\">\n              <sc-for list=\"{{ spacingScale }}\" as=\"sp\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex;align-items:center;gap:12px;\">\n                  <div style=\"width:90px;font-size:11.5px;font-weight:700;color:#9CA3AF;font-family:monospace;flex-shrink:0;\">{{ sp.label }}<\u002Fdiv>\n                  <div style=\"height:10px;background:#4353E8;border-radius:3px;box-shadow:2px 2px 5px rgba(67,83,232,0.3);width:{{ sp.w }};flex-shrink:0;\"><\u002Fdiv>\n                  <span style=\"font-size:11.5px;font-weight:600;color:#5A6172;\">{{ sp.use }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:800;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:14px;\">BORDER RADIUS<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;\">\n              <sc-for list=\"{{ radiiScale }}\" as=\"r\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:12px;\">\n                  <div style=\"width:90px;font-size:11.5px;font-weight:700;color:#9CA3AF;font-family:monospace;flex-shrink:0;\">{{ r.label }}<\u002Fdiv>\n                  <div style=\"width:36px;height:36px;background:#EEF0FE;border-radius:{{ r.val }};flex-shrink:0;\"><\u002Fdiv>\n                  <span style=\"font-size:11.5px;font-weight:600;color:#5A6172;\">{{ r.use }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { toast: null };\n  _tt = null;\n\n  showToast(t) {\n    clearTimeout(this._tt);\n    this.setState({ toast: t });\n    this._tt = setTimeout(() => this.setState({ toast: null }), 2600);\n  }\n\n  renderVals() {\n    const s = this.state;\n\n    const sections = [\n      { icon: '🎨', label: 'Cores', href: '#colors' },\n      { icon: 'Aa', label: 'Tipografia', href: '#typography' },\n      { icon: '⬛', label: 'Botões', href: '#buttons' },\n      { icon: '📝', label: 'Formulários', href: '#forms' },\n      { icon: '🏷️', label: 'Badges & Tags', href: '#badges' },\n      { icon: '👤', label: 'Avatares', href: '#avatars' },\n      { icon: '🃏', label: 'Cards', href: '#cards' },\n      { icon: '💬', label: 'Bolhas', href: '#bubbles' },\n      { icon: '🔔', label: 'Toast', href: '#toast' },\n      { icon: '🗔', label: 'Modais', href: '#modals' },\n      { icon: '🔀', label: 'Controles', href: '#controls' },\n      { icon: '⊟', label: 'Tabelas', href: '#tables' },\n      { icon: '✏️', label: 'Composer', href: '#composer' },\n      { icon: '📐', label: 'Espaçamento', href: '#spacing' }\n    ];\n\n    const colorPrimary = [\n      { name: 'Índigo 600', hex: '#4353E8', border: 'none' },\n      { name: 'Índigo 50', hex: '#EEF0FE', border: '1px solid #DDE1FB' },\n      { name: 'Verde 600', hex: '#1DA85A', border: 'none' },\n      { name: 'Verde 50', hex: '#E8F8EF', border: '1px solid #C5EDD2' },\n      { name: 'Âmbar 500', hex: '#F59E0B', border: 'none' }\n    ];\n    const colorNeutral = [\n      { name: 'Preto', hex: '#14171F', border: 'none' },\n      { name: 'Cinza 700', hex: '#3A4154', border: 'none' },\n      { name: 'Cinza 400', hex: '#6B7280', border: 'none' },\n      { name: 'Cinza 200', hex: '#E8EAF0', border: '1px solid #D7DBE6' },\n      { name: 'Fundo', hex: '#F4F6FA', border: '1px solid #E8EAF0' }\n    ];\n    const colorState = [\n      { name: 'Danger 600', hex: '#D1383E', border: 'none' },\n      { name: 'Danger 50', hex: '#FEE2E2', border: '1px solid #FECACA' },\n      { name: 'Nota bg', hex: '#FFF7DE', border: '1px solid #E5CE8F' },\n      { name: 'Nota border', hex: '#E5CE8F', border: 'none' },\n      { name: 'Chat bg', hex: '#DCF7E3', border: '1px solid #C5EDD2' }\n    ];\n\n    const typeScale = [\n      { label: 'Heading XL', spec: '800 · 26px · 1.2', size: '26px', weight: '800', lh: '1.2', color: '#14171F', sample: 'Atendimentos' },\n      { label: 'Heading L', spec: '800 · 20px · 1.3', size: '20px', weight: '800', lh: '1.3', color: '#14171F', sample: 'Fila & Distribuição' },\n      { label: 'Heading M', spec: '800 · 17px · 1.4', size: '17px', weight: '800', lh: '1.4', color: '#14171F', sample: 'Transferir atendimento' },\n      { label: 'Body M', spec: '600 · 14px · 1.5', size: '14px', weight: '600', lh: '1.5', color: '#3A4154', sample: 'Olá! Queria reservar uma churrasqueira para sábado.' },\n      { label: 'Label', spec: '700 · 11.5px', size: '11.5px', weight: '700', lh: '1.4', color: '#5A6172', sample: 'SETOR · ATENDENTE · CATEGORIA' },\n      { label: 'Micro', spec: '600 · 10px · 0.08em', size: '10.5px', weight: '600', lh: '1.3', color: '#9CA3AF', sample: 'TOTAL MENSAGENS · T. MÉDIO RESPOSTA' }\n    ];\n\n    const spacingScale = [\n      { label: '4px', w: '16px', use: 'gap XS, ícone/texto' },\n      { label: '6px', w: '24px', use: 'gap SM (badges)' },\n      { label: '8px', w: '32px', use: 'gap entre botões' },\n      { label: '12px', w: '48px', use: 'padding card SM' },\n      { label: '16px', w: '64px', use: 'padding lateral padrão' },\n      { label: '18px', w: '72px', use: 'padding card M' },\n      { label: '24px', w: '96px', use: 'padding card L / gutter' },\n      { label: '32px', w: '128px', use: 'padding seções' }\n    ];\n\n    const radiiScale = [\n      { label: '5–7px', val: '6px', use: 'chips / tooltips' },\n      { label: '8–9px', val: '9px', use: 'botões XS–SM' },\n      { label: '10–11px', val: '11px', use: 'inputs / botões MD' },\n      { label: '12px', val: '12px', use: 'botões LG / composer' },\n      { label: '14–16px', val: '16px', use: 'cards / painéis' },\n      { label: '18px', val: '18px', use: 'modais' },\n      { label: '99px', val: '99px', use: 'avatares / badges / pills' }\n    ];\n\n    const toastMsgs = ['Macro salva ✓', 'Etiqueta adicionada', 'Atendimento aceito', 'Transferido para Cheila', 'Modo de distribuição: Rodízio'];\n    this._toastIdx = (this._toastIdx || 0);\n\n    return {\n      sections, colorPrimary, colorNeutral, colorState, typeScale, spacingScale, radiiScale,\n      toastMsg: s.toast,\n      hasToast: !!s.toast,\n      fireToast: () => {\n        const msg = toastMsgs[this._toastIdx % toastMsgs.length];\n        this._toastIdx++;\n        this.showToast(msg);\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
