<VirtualHost *:443>
    ServerName servicos2.santamonica.rec.br
    DocumentRoot /var/www/smcc-whatsapp/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/servicos2.santamonica.rec.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/servicos2.santamonica.rec.br/privkey.pem

    # Compatibilidade: URLs antigas /smcc-whatsapp/public/* -> /*
    RewriteEngine On
    RewriteRule ^/smcc-whatsapp/public/?$ /login [R=301,L]
    RewriteRule ^/smcc-whatsapp/public/(.*)$ /$1 [R=301,L]
    RewriteRule ^/smcc-whatsapp/?$ /login [R=301,L]

    <Directory /var/www/smcc-whatsapp/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/smcc-whatsapp-error.log
    CustomLog ${APACHE_LOG_DIR}/smcc-whatsapp-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName servicos2.santamonica.rec.br
    RewriteEngine On
    RewriteRule ^/smcc-whatsapp/public/?$ https://%{HTTP_HOST}/login [R=301,L]
    RewriteRule ^/smcc-whatsapp/public/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
    RewriteRule ^/smcc-whatsapp/?$ https://%{HTTP_HOST}/login [R=301,L]
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>
